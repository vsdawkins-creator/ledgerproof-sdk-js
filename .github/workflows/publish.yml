name: Publish to npm (provenance)

# Publishes @ledgerproof/sdk to npm via trusted publishing (OIDC) WITH build
# provenance. No NPM_TOKEN secret: CI exchanges its short-lived GitHub OIDC
# identity for a one-time npm publish credential, and npm mints a Sigstore
# provenance attestation linking the tarball to this PUBLIC repo + commit + run.
#
# ONE-TIME SETUP (npmjs.com web UI -- cannot be done from the CLI):
#   1. @ledgerproof/sdk -> Settings -> Trusted Publisher -> GitHub Actions:
#      org `vsdawkins-creator`, repo `ledgerproof-sdk-js`, workflow `publish.yml`.
#   2. Enable account 2FA and set the package to require "two-factor
#      authentication or trusted publishing" for writes; revoke legacy tokens.
#
# Run with dry_run = true first, then dry_run = false to actually publish.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Simulate only (npm publish --dry-run). Nothing is published."
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # REQUIRED -- OIDC for trusted publishing + provenance

jobs:
  publish:
    name: "@ledgerproof/sdk"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest
      - name: Install (clean, from lockfile)
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test — gate (never publish a red build)
        run: npm test
      - name: Publish with provenance
        if: ${{ inputs.dry_run == false }}
        run: npm publish --access public --provenance
      - name: Simulate publish (dry run — nothing is published)
        if: ${{ inputs.dry_run == true }}
        run: npm publish --access public --provenance --dry-run
