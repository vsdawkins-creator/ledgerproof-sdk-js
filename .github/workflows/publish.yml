name: Publish to npm (provenance)

# Publishes @ledgerproof/sdk to npm WITH build provenance: a Sigstore attestation,
# generated via GitHub OIDC, linking the tarball to this PUBLIC repo + commit + run.
#
# AUTH: an npm token (repo secret NPM_TOKEN). Pragmatic fallback while npm Trusted
# Publishing (OIDC, tokenless) is finished. Once the trusted publisher is set for
# @ledgerproof/sdk (org `vsdawkins-creator`, repo `ledgerproof-sdk-js`, workflow
# `publish.yml`), delete the NODE_AUTH_TOKEN env below and revoke the token.
# Provenance is independent of the auth method — it comes from id-token + the
# public repo.
#
# Run with dry_run = true first, then dry_run = false to actually publish.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Simulate only (npm publish --dry-run). Nothing is published."
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # REQUIRED -- OIDC for trusted publishing + provenance

jobs:
  publish:
    name: "@ledgerproof/sdk"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest
      - name: Install (clean, from lockfile)
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test — gate (never publish a red build)
        run: npm test
      - name: Publish with provenance
        if: ${{ inputs.dry_run == false }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Simulate publish (dry run — nothing is published)
        if: ${{ inputs.dry_run == true }}
        run: npm publish --access public --provenance --dry-run
